# Exemplo de configuração multi-contas.
# Não coloque tokens neste arquivo. Tokens ficam no Google Secret Manager.

accounts:
  - id: pessoal_google
    provider: gmail
    email: diegocdvs13@gmail.com
    enabled: true
    secret_prefix: google-pessoal
    max_emails: 25
    policies:
      dry_run: true
      mark_read_categories:
        - promocoes
        - newsletter
      never_mark_read_priorities:
        - critica
        - importante

  - id: profissional_google
    provider: gmail
    email: seu-email-profissional@gmail.com
    enabled: false
    secret_prefix: google-profissional
    max_emails: 25
    policies:
      dry_run: true
      mark_read_categories:
        - promocoes
        - newsletter
      never_mark_read_priorities:
        - critica
        - importante

  - id: profissional_outlook
    provider: outlook
    email: seu-email-profissional@empresa.com
    enabled: false
    secret_prefix: outlook-profissional
    max_emails: 25
    policies:
      dry_run: true
      mark_read_categories:
        - promocoes
        - newsletter
      never_mark_read_priorities:
        - critica
        - importante
